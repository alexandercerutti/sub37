<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Test page</title>
		<link href="style.css" rel="stylesheet" />
	</head>
	<body>
		<main>
				<scheduled-textarea placeholder="WEBVTT..."></scheduled-textarea>
				<div id="video-container">
					<fake-video controls></fake-video>
					<captions-renderer id="presenter"></captions-renderer>
				</div>
			</div>
			<!-- form id and input names are hardcoded inside the code -->
			<form id="content-type" is="processor-selector">
				<h4>Content type:</h4>
				<div>
					<input type="radio" id="webvtt" name="caption-type" value="text/vtt" checked />
					<label for="webvtt">WebVTT (text/vtt)</label>
				</div>
				<div>
					<input type="radio" id="ttml" name="caption-type" value="application/ttml+xml" />
					<label for="ttml">TTML (application/ttml+xml)</label>
				</div>
				<div>
					<!-- <input type="radio" id="ttml" name="caption-type" value="text/xml+ttml" />
					<label for="ttml">TTML (text/xml+ttml)</label> -->
				</div>
			</form>
			<div>
				<div>
					<label for="load-default-track">Load a default track:</label>
				</div>
				<select id="load-default-track" placeholder="Load a default track">
					<option id="ttml">TTML</option>
					<option id="webvtt">WEBVTT</option>
				</select>
			</div>
			<form id="renderer-settings">
				<h4>Renderer settings:</h4>
				<div>
					<label for="lines">Lines:</label>
					<input type="number" id="lines" name="lines" value="2" min="1" />
				</div>
				<div>
					<input type="checkbox" id="shiftDownFirstLine" name="shiftDownFirstLine" />
					<label for="shiftDownFirstLine">Shift down first line</label>
				</div>
				<div>
					<input type="checkbox" id="snapHeightToLineGrid" name="snapHeightToLineGrid" checked />
					<label for="snapHeightToLineGrid">Snap height to line grid</label>
				</div>
			</form>
		</main>
		<script type="module" src="script.mjs"></script>
	</body>
</html>
