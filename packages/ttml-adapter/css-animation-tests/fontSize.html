<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Test: fontSize.html</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .target {
            width: 400px;
            height: 400px;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
             /* text-align: center; ensure text flows nicely */
            text-align: center;
            background-color: #eee;
            border: 1px solid #ccc;
            /* Base Styles */
            
            
            animation: test-anim 3s infinite;
        }

        @keyframes test-anim {
            0% {
                font-size: 12px;
            }
            50% {
                font-size: 24px;
            }
            100% {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <h1>fontSize.html</h1>
    <div class="target">
        Lorem ipsum dolor sit amet.
    </div>
</body>
</html>
